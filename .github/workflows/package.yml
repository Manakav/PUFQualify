name: Manual Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build & Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        python-version: ["3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build analyze_gui
        run: |
          python build_exe.py

      # --- 修改点：根据操作系统重命名可执行文件 ---
      - name: Rename Executable
        id: rename
        shell: bash
        run: |
          SOURCE_FILE="dist/analyze_gui/analyze_gui.exe"
          EXT=".exe"
          TARGET_NAME="analyze_gui-${{ inputs.version }}-windows${EXT}"
          mv "$SOURCE_FILE" "$TARGET_NAME"
          echo "target_name=${TARGET_NAME}" >> $GITHUB_OUTPUT

      # --- 修改点：直接创建 Release 并上传该系统的文件 ---
      - name: Create Release and Upload
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          body: |
            Automated build for ${{ runner.os }}.
            Commit: ${{ github.sha }}
          files: |
            ${{ steps.rename.outputs.target_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
