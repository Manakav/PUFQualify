name: Manual Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build & Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build analyze_gui
        run: |
          python build_exe.py

      # --- 修改点：根据操作系统重命名可执行文件 ---
      - name: Rename Executable
        id: rename
        shell: bash
        run: |
          # 假设你的 pyinstaller 生成的文件名为 analyze_gui
          # 1. 确定源文件路径 (Windows 在 dist/analyze_gui/analyze_gui.exe, 其他在 dist/analyze_gui/analyze_gui)
          if [ "${{ runner.os }}" == "Windows" ]; then
            SOURCE_FILE="dist/analyze_gui/analyze_gui.exe"
            EXT=".exe"
          elif [ "${{ runner.os }}" == "macOS" ]; then
            # macOS 通常会生成 .app 文件夹，这里假设我们要打包 app 或者提取二进制
            # 如果是纯二进制，路径类似 Linux。如果是 .app，通常打包成 zip。
            # 这里假设我们要上传 .app 文件夹
            SOURCE_FILE="dist/analyze_gui.app"
            EXT=".app"
          else
            SOURCE_FILE="dist/analyze_gui/analyze_gui"
            EXT=""
          fi

          # 2. 生成目标文件名：analyze_gui-{version}-{os}
          TARGET_NAME="analyze_gui-${{ inputs.version }}-${{ runner.os }}${EXT}"
          
          # 3. 移动并重命名
          mv "$SOURCE_FILE" "$TARGET_NAME"
          
          # 4. 输出变量供后续步骤使用
          echo "target_name=${TARGET_NAME}" >> $GITHUB_OUTPUT

      # --- 修改点：直接创建 Release 并上传该系统的文件 ---
      - name: Create Release and Upload
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          body: |
            Automated build for ${{ runner.os }}.
            Commit: ${{ github.sha }}
          files: |
            ${{ steps.rename.outputs.target_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
