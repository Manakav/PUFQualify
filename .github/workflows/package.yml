name: Manual Build and Release

# 1. 修改触发条件：仅保留手动触发
on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string

# 权限保持不变
permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build analyze_gui
        run: |
          python build_exe.py
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pufqualify-dist-${{ matrix.os }}
          path: dist

  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Archive artifacts into zip
        run: |
          # 2. 使用手动输入的版本号命名文件
          ZIPNAME="pufqualify-build-${{ inputs.version }}.zip"
          cd artifacts
          # 打包所有子文件夹
          zip -r "../${ZIPNAME}" */
          cd ..
        shell: bash

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          # 3. 使用手动输入的版本号作为 Tag 和 Release 名称
          tag_name: ${{ inputs.version }}
          release_name: Release ${{ inputs.version }}
          body: |
            Manual build triggered by @${{ github.actor }}.
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset (zip)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          # 4. 上传对应版本号的文件
          asset_path: ./pufqualify-build-${{ inputs.version }}.zip
          asset_name: pufqualify-build-${{ inputs.version }}.zip
          asset_content_type: application/zip
