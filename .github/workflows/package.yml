name: Build and Package

on:
  push:
    # 仅在推送 tag 时触发（例如 git tag v1.2.3 && git push origin --tags）
    tags:
      - '*'
  # 也在 Release 发布时触发（当在 GitHub 上 Publish Release）
  release:
    types: [published]

jobs:
  build:
    name: Build packages on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [3.10]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build analyze_gui (bundle fonts)
        run: |
          python build_exe.py
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pufqualify-dist-${{ matrix.os }}
          path: dist

  create_release:
    name: Create Release and upload artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -R artifacts || true

      - name: Create or update GitHub Release and upload artifacts
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Use the tag that triggered the workflow (either push tag or release tag)
          tag: ${{ github.event.release.tag_name || github.ref_name }}
          name: Build ${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }} (workflow run ${{ github.run_number }}).
          files: artifacts/**
